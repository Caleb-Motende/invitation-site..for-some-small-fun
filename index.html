<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Are you free?</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #2f3542;
            --glass: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #f8a5c2, #f7d794);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            max-width: 400px;
            width: 90%;
            transition: all 0.3s ease;
        }

        h1 {
            color: #2f3542;
            font-size: 1.8rem;
            margin-bottom: 2rem;
        }

        .btn-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        .btn-yes {
            background-color: #2ed573;
            color: white;
        }

        .btn-no {
            background-color: var(--primary);
            color: white;
        }

        button:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        /* For the "Yes or Yes" phase */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h1 id="questionText">Are you free next week?</h1>
        <div class="btn-container" id="buttonBox">
            <button class="btn-yes" onclick="celebrate()">Yes</button>
            <button class="btn-no" onclick="goToStepTwo()">No</button>
        </div>
    </div>

    <script>
        const card = document.getElementById('mainCard');
        const question = document.getElementById('questionText');
        const buttonBox = document.getElementById('buttonBox');

        function celebrate() {
            // Success State
            question.innerText = "Yay! Na rada umenyamaza mse! 🎉";
            buttonBox.innerHTML = '';
            
            // Trigger Confetti
            var duration = 5 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
              return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
              var timeLeft = animationEnd - Date.now();

              if (timeLeft <= 0) {
                return clearInterval(interval);
              }

              var particleCount = 50 * (timeLeft / duration);
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
              confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        function goToStepTwo() {
            question.innerText = "Are you sure? Maybe rethink?";
            buttonBox.innerHTML = `
                <button class="btn-yes" onclick="celebrate()">Yes</button>
                <button class="btn-no" onclick="goToStepThree()">Try Again</button>
            `;
        }

        function goToStepThree() {
            question.innerText = "Pick an option:";
            buttonBox.innerHTML = `
                <button class="btn-yes" onclick="celebrate()">Yes</button>
                <button class="btn-yes" onclick="celebrate()">Yes</button>
            `;
        }
    </script>
</body>
</html>
